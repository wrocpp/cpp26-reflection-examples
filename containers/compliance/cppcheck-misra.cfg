# cppcheck MISRA addon configuration. The MISRA rule text is NOT
# distributed with cppcheck (licensing); this config wires up the
# addon and sets the default rule severity. Readers add their own
# misra_rules.txt next to it for full text expansion.
{
    "script": "misra.py",
    "args": [
        "--rule-texts=/opt/wrocpp/misra_rules.txt"
    ]
}
