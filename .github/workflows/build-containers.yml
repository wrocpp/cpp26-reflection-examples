# Build + publish the wro.cpp toolset containers to ghcr.io/wrocpp/cpp-*.
# Matrix build; cluster images depend on cpp-base, so cpp-base goes
# first and the rest run after it succeeds.
#
# Triggers:
#   * push to any branch touching containers/** -> build all + tag the branch
#   * push to main touching containers/** -> tag rolling 2026-05
#   * workflow_dispatch -> build everything ad-hoc
#
# Tag scheme:
#   * 2026-05 : rolling release, what /toolset/ pages link to
#   * sha-<short> : per-build snapshot, useful for debugging
#   * branch-<name> : per-feature-branch builds for PR review
#
# SECURITY: every value used in run: blocks comes from controlled
# system context (github.ref_name, github.sha, github.actor, secrets).
# No user-controlled input (issue body, PR title, commit message body)
# flows into shell. See
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

name: build-containers

on:
  push:
    branches: ["**"]
    paths:
      - "containers/**"
      - ".github/workflows/build-containers.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: wrocpp

jobs:
  base:
    name: build cpp-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_NAME" = "main" ]; then
            echo "tag=2026-05" >> "$GITHUB_OUTPUT"
          else
            sanitized=$(echo "$REF_NAME" | tr '/' '-')
            echo "tag=branch-${sanitized}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push cpp-base
        uses: docker/build-push-action@v5
        with:
          context: containers/base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/cpp-base:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/cpp-base:sha-${{ github.sha }}
          cache-from: type=gha,scope=cpp-base
          cache-to: type=gha,mode=max,scope=cpp-base
